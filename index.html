<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse Ecosystem</title>
  <meta name="description" content="The Local Intelligence Platform. One intelligence. Many applications." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="css/app.css" />
  <script type="module" src="js/app.js"></script>
  <style>
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #000; color: #fff; font-family: 'Inter', sans-serif;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner { width: 20px; height: 20px; margin-right: 12px; }
    #loading .l-text { font-size: 14px; color: rgba(255,255,255,0.4); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { border: 2px solid rgba(255,255,255,0.1); border-top-color: #00ff9c; border-radius: 50%; animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span class="l-text">Loading Synapse Ecosystem...</span>
  </div>
  <div id="app"></div>
  <noscript>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:24px;">
      <div>
        <h1 style="font-size:24px;margin-bottom:12px;">JavaScript Required</h1>
        <p style="color:rgba(255,255,255,0.5);">Synapse Ecosystem requires JavaScript to render. Please enable it and reload.</p>
      </div>
    </div>
  </noscript>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => document.getElementById('loading')?.classList.add('hidden'), 3000);
    });
  </script>
</body>
</html>
